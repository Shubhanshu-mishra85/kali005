<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kali005 - Premium Landing Page</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->
<header class="navbar">
  <h2 class="logo">Kali005</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#features">Features</a>
    <a href="#pricing">Pricing</a>
  </nav>
</header>

<!-- Hero -->
<section class="hero">
  <div class="hero-content">
    <h1>Build Something Premium 🚀</h1>
    <p>Modern landing page with animations & smooth UI</p>
    <button onclick="scrollToSection()">Get Started</button>
  </div>
</section>

<!-- Features -->
<section id="features" class="features">
  <h2>Features</h2>
  <div class="feature-box">
    <div class="card">⚡ Fast</div>
    <div class="card">🎨 Modern</div>
    <div class="card">📱 Responsive</div>
  </div>
</section>

<!-- Pricing -->
<section id="pricing" class="pricing">
  <h2>Pricing</h2>
  <div class="pricing-box">
    <div class="price-card">Basic - $9</div>
    <div class="price-card premium">Pro - $29</div>
    <div class="price-card">Enterprise - $99</div>
  </div>
</section>

<!-- Testimonials -->
<section class="testimonials">
  <h2>What Users Say</h2>
  <p id="testimonial-text">"Amazing design!"</p>
</section>

<!-- Footer -->
<footer>
  <p>© 2026 Kali005</p>
</footer>

<script src="script.js"></script>

</body>
</html>
